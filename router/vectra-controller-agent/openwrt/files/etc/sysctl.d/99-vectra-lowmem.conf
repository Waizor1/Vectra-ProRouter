# Vectra ProRouter low-RAM tuning for AX3000T-class devices (~234 MB usable).
# Loaded by procd's /etc/init.d/sysctl on boot, and by the controller's
# uci-defaults setup script at install time. Defaults below assume the
# vectra-oom-guard service is also running — these two work together: sysctl
# keeps the kernel from entering global_oom in the first place, the guard
# ensures critical Go-runtime processes are not picked when OOM does fire.

# Raise the kernel's reserved free-page pool from the default ~16 MB to 24 MB
# on this hardware. Below this watermark the kernel reclaims aggressively; if
# free pages drop further it falls back to invoking the OOM killer for a
# single order=0 page failure. The 24 MB figure is ~10% of total RAM, the
# rule-of-thumb for embedded systems running large mmap-heavy daemons.
vm.min_free_kbytes = 24576

# Favor compressing cold anonymous pages into zram (which AX3000T already has
# configured by default) over evicting page cache. Default 60 leaves zram
# largely unused even when memory is tight; 80 makes the kernel reach for
# compressed swap earlier, giving us ~50 MB of effective RAM via 3x compression.
vm.swappiness = 80

# Reclaim dentry/inode caches more aggressively under pressure. Defaults to 100
# (balanced); 200 doubles the rate, which is appropriate when total RAM is so
# small that holding tens of thousands of inode entries crowds out anon pages.
vm.vfs_cache_pressure = 200
